name: 'GitHub README Dashboard'
description: 'OSS contributor dashboard generator. Maintains live activity, review, and bookkeeping sections in any markdown file.'
author: 'Peter Bryant'
branding:
  icon: 'activity'
  color: 'blue'

inputs:
  github_token:
    description: 'GitHub token for API access. A fine-grained PAT with repo:read and pull-requests:read is required for cross-repo visibility. The default GITHUB_TOKEN is limited to the current repository.'
    required: true
  username:
    description: 'GitHub username to build the dashboard for. Defaults to the repository owner.'
    required: false
    default: ${{ github.repository_owner }}
  sections:
    description: 'Comma-separated list of dashboard sections to render. Available: standup, open_prs, response_inbox, review_inbox, recent_activity, activity_feed, merged_prs, stats, pinned_prs, stale_prs, failing_ci, ready_to_merge, velocity_chart, commit_heatmap, streak.'
    required: false
    default: 'open_prs,response_inbox,review_inbox,recent_activity'
  target_file:
    description: 'Markdown file to update.'
    required: false
    default: 'README.md'
  commit_message:
    description: 'Commit message for the update.'
    required: false
    default: 'chore: update readme dashboard'
  commit_name:
    description: 'Committer name.'
    required: false
    default: 'github-actions[bot]'
  commit_email:
    description: 'Committer email.'
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'
  commit:
    description: 'Whether the action should commit and push changes. Set to false to let downstream steps handle the commit.'
    required: false
    default: 'true'
  config_file:
    description: 'Path to a YAML file with per-section rendering config (style, columns, status labels, date format, empty state). Inline inputs win over the file. Missing file is treated as empty config.'
    required: false
    default: '.github/readme-dashboard.yml'
  status_labels:
    description: 'JSON object overriding status tag text. Example: {"merged":"merged","open":"open","draft":"wip"}. Overrides values from config_file.'
    required: false
  date_format:
    description: 'How dates are rendered: relative (default), absolute (YYYY-MM-DD), or both.'
    required: false
    default: 'relative'
  theme:
    description: 'Visual theme for every section. "default" uses emoji status icons; "minimal" strips all emoji for a clean, plain-text dashboard. Per-section override and custom status_labels still win over the theme.'
    required: false
    default: 'default'

  # Section tuning (shared across sections)
  max_rows:
    description: 'Default cap on rows rendered per section.'
    required: false
    default: '10'
  include_drafts:
    description: 'Include draft pull requests in PR-based sections.'
    required: false
    default: 'false'
  repositories:
    description: 'Comma-separated owner/repo list to scope every section to. Empty means all repos visible to the token.'
    required: false
  exclude_repositories:
    description: 'Comma-separated owner/repo list to exclude from every section.'
    required: false

  # Section-specific tuning
  activity_days:
    description: '[recent_activity] Days of comment history to include.'
    required: false
    default: '14'
  merged_window_days:
    description: '[merged_prs] Look-back window in days for merged PRs. Set to 0 to show all merged PRs with no time limit.'
    required: false
    default: '90'
  activity_feed_days:
    description: '[activity_feed] Optional look-back window in days for the public activity timeline. 0 (default) shows the most recent events regardless of age.'
    required: false
    default: '0'
  activity_feed_types:
    description: '[activity_feed] Comma-separated event types to include (e.g. PullRequestEvent, IssueCommentEvent, PushEvent, WatchEvent). Empty uses a sensible default set.'
    required: false
  activity_feed_repositories:
    description: '[activity_feed] Comma-separated owner/repo list to scope the activity feed to specific repositories. Merges with the global repositories filter. The Events API does not support server-side filtering, so this is applied client-side.'
    required: false
  activity_feed_exclude_repositories:
    description: '[activity_feed] Comma-separated owner/repo list to exclude from the activity feed. Additive with the global exclude_repositories. Applied client-side after fetching events.'
    required: false
  recent_activity_exclude_repositories:
    description: '[recent_activity] Comma-separated owner/repo list to exclude from the recent activity section only. Additive with the global exclude_repositories.'
    required: false
  stats_periods:
    description: '[stats] Comma-separated periods to report. Any of: week, month, quarter, year.'
    required: false
    default: 'week,month,year'

  stale_days:
    description: '[stale_prs] Days of inactivity before a PR is considered stale.'
    required: false
    default: '14'
  velocity_weeks:
    description: '[velocity_chart] Number of weeks to plot.'
    required: false
    default: '12'
  heatmap_months:
    description: '[commit_heatmap, streak] Months of contribution history to include.'
    required: false
    default: '12'
  standup_layout:
    description: '[standup] Comma-separated list of blocks. Available: hero, needs_attention, open_prs, recently_merged, stale_prs, failing_ci, ready_to_merge, response_inbox, review_inbox, activity_feed. Default: hero,needs_attention,open_prs,recently_merged,response_inbox,review_inbox,activity_feed.'
    required: false
  standup_rows:
    description: '[standup] Per-block row cap for embedded tables.'
    required: false
    default: '5'
  standup_orgs:
    description: '[standup] Comma-separated GitHub orgs to render separate sub-dashboards for. Each org gets its own hero + needs_attention + tables, scoped via `org:<name>` in queries. Empty means a single global view.'
    required: false
  disable_pat_warning:
    description: '[standup] Suppress the PAT-missing banner even when the action detects a bot token.'
    required: false
    default: 'false'
  open_prs_show_ci:
    description: '[open_prs] When true, include per-PR CI status in the State column. Adds 1 REST call per PR.'
    required: false
    default: 'false'
  viz_style:
    description: 'Default visualization style for chart sections: mermaid (default), unicode, or both. Per-section override goes in config_file.'
    required: false
    default: 'mermaid'

  # pinned_prs
  pinned_prs_state:
    description: '[pinned_prs] Filter PRs by state: open, closed, merged, all.'
    required: false
    default: 'all'
  pinned_prs_start_date:
    description: '[pinned_prs] Start date for PR filtering (YYYY-MM-DD).'
    required: false
  pinned_prs_end_date:
    description: '[pinned_prs] End date for PR filtering (YYYY-MM-DD).'
    required: false
  pinned_prs_blacklist:
    description: '[pinned_prs] Comma-separated PR numbers to exclude.'
    required: false
  pinned_prs_sort_by:
    description: '[pinned_prs] Sort key: created, updated, popularity.'
    required: false
    default: 'updated'

outputs:
  updated:
    description: 'true if the target file was modified.'
  sections_rendered:
    description: 'Comma-separated list of sections that rendered successfully.'
  sections_failed:
    description: 'Comma-separated list of sections that failed to render.'

runs:
  using: 'node20'
  main: 'dist/index.js'

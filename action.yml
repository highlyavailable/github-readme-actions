name: 'GitHub README Dashboard'
description: 'OSS contributor dashboard generator. Maintains live activity, review, and bookkeeping sections in any markdown file.'
author: 'Peter Bryant'
branding:
  icon: 'activity'
  color: 'blue'

inputs:
  github_token:
    description: 'GitHub token for API access. A fine-grained PAT with repo:read and pull-requests:read is required for cross-repo visibility. The default GITHUB_TOKEN is limited to the current repository.'
    required: true
  username:
    description: 'GitHub username to build the dashboard for. Defaults to the repository owner.'
    required: false
    default: ${{ github.repository_owner }}
  sections:
    description: 'Comma-separated list of dashboard sections to render. Available: open_prs, response_inbox, review_inbox, recent_activity, merged_prs, stats, pinned_prs.'
    required: false
    default: 'open_prs,response_inbox,review_inbox,recent_activity'
  target_file:
    description: 'Markdown file to update.'
    required: false
    default: 'README.md'
  commit_message:
    description: 'Commit message for the update.'
    required: false
    default: 'chore: update readme dashboard'
  commit_name:
    description: 'Committer name.'
    required: false
    default: 'github-actions[bot]'
  commit_email:
    description: 'Committer email.'
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'
  commit:
    description: 'Whether the action should commit and push changes. Set to false to let downstream steps handle the commit.'
    required: false
    default: 'true'
  config_file:
    description: 'Path to a YAML file with per-section rendering config (style, columns, status labels, date format, empty state). Inline inputs win over the file. Missing file is treated as empty config.'
    required: false
    default: '.github/readme-dashboard.yml'
  status_labels:
    description: 'JSON object overriding status tag text. Example: {"merged":"merged","open":"open","draft":"wip"}. Overrides values from config_file.'
    required: false
  date_format:
    description: 'How dates are rendered: relative (default), absolute (YYYY-MM-DD), or both.'
    required: false
    default: 'relative'

  # Section tuning (shared across sections)
  max_rows:
    description: 'Default cap on rows rendered per section.'
    required: false
    default: '10'
  include_drafts:
    description: 'Include draft pull requests in PR-based sections.'
    required: false
    default: 'false'
  repositories:
    description: 'Comma-separated owner/repo list to scope every section to. Empty means all repos visible to the token.'
    required: false
  exclude_repositories:
    description: 'Comma-separated owner/repo list to exclude from every section.'
    required: false

  # Section-specific tuning
  activity_days:
    description: '[recent_activity] Days of comment history to include.'
    required: false
    default: '14'
  merged_window_days:
    description: '[merged_prs] Look-back window in days for merged PRs.'
    required: false
    default: '90'
  stats_periods:
    description: '[stats] Comma-separated periods to report. Any of: week, month, quarter, year.'
    required: false
    default: 'week,month,year'

  # pinned_prs (kept from v1 for back-compat)
  pinned_prs_state:
    description: '[pinned_prs] Filter PRs by state: open, closed, merged, all.'
    required: false
    default: 'all'
  pinned_prs_start_date:
    description: '[pinned_prs] Start date for PR filtering (YYYY-MM-DD).'
    required: false
  pinned_prs_end_date:
    description: '[pinned_prs] End date for PR filtering (YYYY-MM-DD).'
    required: false
  pinned_prs_blacklist:
    description: '[pinned_prs] Comma-separated PR numbers to exclude.'
    required: false
  pinned_prs_sort_by:
    description: '[pinned_prs] Sort key: created, updated, popularity.'
    required: false
    default: 'updated'

outputs:
  updated:
    description: 'true if the target file was modified.'
  sections_rendered:
    description: 'Comma-separated list of sections that rendered successfully.'
  sections_failed:
    description: 'Comma-separated list of sections that failed to render.'

runs:
  using: 'node20'
  main: 'dist/index.js'

name: Readme dashboard

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render dashboard
        uses: ./
        with:
          github_token: ${{ secrets.DASHBOARD_PAT || secrets.GITHUB_TOKEN }}
          username: highlyavailable
          sections: command_center
          stale_days: 21
          command_center_rows: 5

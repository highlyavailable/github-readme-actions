name: Readme dashboard

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render dashboard
        uses: ./
        with:
          github_token: ${{ secrets.DASHBOARD_PAT || secrets.GITHUB_TOKEN }}
          username: highlyavailable
          sections: open_prs, response_inbox, review_inbox, recent_activity, merged_prs, stats
          max_rows: 8
          activity_days: 21

name: Readme dashboard

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render dashboard
        uses: ./
        with:
          github_token: ${{ secrets.DASHBOARD_PAT || secrets.GITHUB_TOKEN }}
          username: highlyavailable
          sections: standup, merged_prs, activity_feed
          stale_days: 21
          command_center_rows: 5      # keeps the standup preview compact
          merged_window_days: 3650    # ~10 years -> effectively all-time merged PRs
          max_rows: 50                # cap for the standalone merged + activity lists

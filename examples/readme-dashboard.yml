# Example .github/readme-dashboard.yml — drop this in your repo to control how each
# dashboard section renders. Inline `with:` inputs always win over this file.

defaults:
  date_format: relative          # relative | absolute | both
  viz_style: mermaid             # mermaid | unicode | both
  status_labels:
    merged: "[merged]"
    open: "[open]"
    closed: "[closed]"
    draft: "[draft]"
    approved: "[approved]"
    ci_failing: "[ci:failing]"

sections:
  # Composite block — single marker pair, full dashboard inside
  standup:
    layout: [hero, needs_attention, ready_to_merge, failing_ci, response_inbox, review_inbox]
    per_block_rows: 5

  # Standalone inbox sections
  open_prs:
    style: table
    columns: [pr, ref, state, updated]
    sort: updated_desc
    empty_state: "Inbox zero."

  stale_prs:
    style: table
    columns: [pr, ref, updated, comments]

  failing_ci:
    style: table
    columns: [pr, ref, failed_names, updated]

  ready_to_merge:
    style: list

  response_inbox:
    style: list
    columns: [pr, last_reply, age]

  review_inbox:
    style: table
    columns: [pr, ref, author, updated]

  recent_activity:
    group_by: repo
    show_kind: true

  merged_prs:
    style: table
    columns: [pr, ref, merged_date]

  # Visualizations
  velocity_chart:
    viz_style: mermaid

  commit_heatmap:
    viz_style: unicode

  streak:
    style: compact

  # Headers / stats
  stats:
    style: compact

  pinned_prs:
    style: list
    columns: [state, pr, ref]

name: Readme dashboard (command center)

# Single composite section approach: one marker pair in the README,
# one block that renders a full dashboard widget — KPIs, velocity chart,
# top open PRs, response inbox, review inbox. Plus standalone viz blocks.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: highlyavailable/github-readme-actions@v2
        with:
          github_token: ${{ secrets.DASHBOARD_PAT }}
          sections: command_center, commit_heatmap, streak
          command_center_layout: kpis, velocity, ready_to_merge, failing_ci, response_inbox, review_inbox
          command_center_rows: 5
          viz_style: mermaid
